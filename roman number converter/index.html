<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roman Numeral Converter</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="google-gradient-bg">
    <main class="container">
      <h1 class="title">Number → Roman Converter</h1>

      <label for="number" class="label">Enter a number (1–3999)</label>
      <input
        id="number"
        class="input"
        type="number"
        placeholder="Enter a number"
      />

      <button id="convert-btn" class="btn">Convert</button>
      <p id="output" class="output"></p>
    </main>

    <script>
      const input = document.getElementById("number");
      const button = document.getElementById("convert-btn");
      const output = document.getElementById("output");

      button.addEventListener("click", () => {
        const value = input.value.trim();

        if (value === "") {
          output.textContent = "Please enter a valid number";
          return;
        }

        const num = Number(value);

        if (isNaN(num)) {
          output.textContent = "Please enter a valid number";
          return;
        }

        if (num < 1) {
          output.textContent =
            "Please enter a number greater than or equal to 1";
          return;
        }

        if (num >= 4000) {
          output.textContent =
            "Please enter a number less than or equal to 3999";
          return;
        }

        output.textContent = toRoman(num);
      });

      function toRoman(n) {
        const map = [
          [1000, "M"],
          [900, "CM"],
          [500, "D"],
          [400, "CD"],
          [100, "C"],
          [90, "XC"],
          [50, "L"],
          [40, "XL"],
          [10, "X"],
          [9, "IX"],
          [5, "V"],
          [4, "IV"],
          [1, "I"],
        ];
        let result = "";
        for (const [value, symbol] of map) {
          while (n >= value) {
            result += symbol;
            n -= value;
          }
        }
        return result;
      }
    </script>
  </body>
</html>
